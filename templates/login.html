{% extends 'base.html' %}

{% block title %}Login - MalaDetect AI{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-screen px-4">
    <div class="glass rounded-2xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="text-4xl mb-4">🧬</div>
            <h2 class="text-3xl font-bold text-white mb-2">Welcome Back</h2>
            <p class="text-gray-300">Sign in to access AI malaria detection</p>
        </div>
        
        <form method="post" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-200 mb-2">Email Address</label>
                <input type="email" id="email" name="email" required
                       class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-gray-200 mb-2">Password</label>
                <input type="password" id="password" name="password" required
                       class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all">
            </div>
            
            <button type="submit" 
                    class="w-full bg-gradient-to-r from-primary to-cyan-600 hover:from-cyan-600 hover:to-primary text-white font-semibold py-3 px-4 rounded-lg transition-all duration-300 transform hover:scale-105">
                Sign In
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <p class="text-gray-300">Don't have an account? 
                <a href="{{ url_for('register') }}" class="text-primary hover:text-cyan-300 font-semibold transition-colors">Create one</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
